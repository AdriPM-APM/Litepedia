<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LitePedia</title>
    <style>
        :root { --bg: #ffffff; --text: #202122; --border: #a2a9b1; --hover: #f0f0f0; }
        body.dark-mode { --bg: #121212; --text: #e0e0e0; --border: #444; --hover: #2a2a2a; }
        
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        
        /* Contenedor de búsqueda */
        .search-box { position: relative; width: 100%; }
        #search-input { width: 100%; padding: 12px; border: 1px solid var(--border); box-sizing: border-box; }
        
        /* Dropdown Estilo Wikipedia */
        #results-dropdown { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: var(--bg); border: 1px solid var(--border); 
            z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: none; max-height: 400px; overflow-y: auto;
        }
        .result-item { 
            display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); 
        }
        .result-item:hover { background: var(--hover); }
        .result-item img { width: 50px; height: 50px; object-fit: cover; margin-right: 15px; }
        .result-text h4 { margin: 0; font-size: 16px; }
        .result-text p { margin: 5px 0 0; font-size: 12px; color: #666; }
        
        .ad-container { position: fixed; bottom: 20px; right: 20px; width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar en Wikipedia..." autocomplete="off">
        <div id="results-dropdown"></div>
    </div>
</div>

<div class="ad-container">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3556713788542025" data-ad-slot="2168826316" data-ad-format="auto"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
    const input = document.getElementById('search-input');
    const dropdown = document.getElementById('results-dropdown');
    let timeout = null;

    input.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            const query = input.value.trim();
            if (query.length > 2) fetchWikipedia(query);
            else dropdown.style.display = 'none';
        }, 300); // Debounce: espera 300ms antes de buscar
    });

    async function fetchWikipedia(query) {
        // API: Busca por prefijo, obtiene imagen y descripción
        const url = `https://en.wikipedia.org/w/api.php?action=query&generator=prefixsearch&gpssearch=${encodeURIComponent(query)}&prop=pageimages|description&piprop=thumbnail&pithumbsize=50&pilimit=5&format=json&origin=*`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            renderResults(data.query ? data.query.pages : []);
        } catch (e) { console.error(e); }
    }

    function renderResults(pages) {
        dropdown.innerHTML = '';
        if (Object.keys(pages).length === 0) { dropdown.style.display = 'none'; return; }

        Object.values(pages).forEach(page => {
            const div = document.createElement('div');
            div.className = 'result-item';
            const img = page.thumbnail ? page.thumbnail.source : 'https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg';
            
            div.innerHTML = `
                <img src="${img}" alt="thumb">
                <div class="result-text">
                    <h4>${page.title}</h4>
                    <p>${page.description || 'Sin descripción disponible'}</p>
                </div>
            `;
            div.onclick = () => { input.value = page.title; dropdown.style.display = 'none'; };
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    }

    // Cerrar al hacer clic fuera
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-box')) dropdown.style.display = 'none'; });
</script>

</body>
</html>
