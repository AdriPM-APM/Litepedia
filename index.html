<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" 
            crossorigin="anonymous"></script>

    <title>LitePedia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root { --link-blue: #3366cc; --text-grey: #54595d; }
        body { font-family: 'Linux Libertine', 'Georgia', serif; background: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 800px; padding: 2rem; }
        
        /* Portal View */
        #home-view { text-align: center; }
        .wiki-header h1 { font-family: 'Playfair Display', serif; font-size: 60px; text-transform: uppercase; margin: 0; font-weight: 400; }
        .wiki-header p { font-style: italic; color: var(--text-grey); margin: 0; }
        
        .globe-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 40px; margin: 40px 0; }
        .lang-link { cursor: pointer; text-decoration: none; color: var(--link-blue); }
        .lang-link:hover { text-decoration: underline; }
        .lang-link span { display: block; font-size: 12px; color: var(--text-grey); }
        
        .search-wrapper { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        #search-input { width: 300px; padding: 8px; border: 1px solid #a2a9b1; }
        #lang-select { padding: 8px; border: 1px solid #a2a9b1; }
        button { background: #e8ecef; border: 1px solid #a2a9b1; padding: 5px 15px; cursor: pointer; }

        /* Reader View */
        #reader-view { display: none; text-align: left; }
        .back-btn { margin-bottom: 20px; color: var(--link-blue); cursor: pointer; }
        #ai-summary { font-size: 18px; line-height: 1.6; color: #202122; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-view">
        <div class="wiki-header">
            <h1>Litepedia</h1>
            <p>L’enciclopèdia lliure i resumida per IA</p>
        </div>

        <div class="globe-container" id="lang-grid">
            <!-- Languages will be generated here -->
        </div>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search...">
            <select id="lang-select">
                <option value="en">English</option>
                <option value="es" selected>Español</option>
                <option value="ca">Català</option>
                <option value="fr">Français</option>
            </select>
            <button onclick="executeSearch()">Search</button>
        </div>
    </div>

    <div id="reader-view">
        <div class="back-btn" onclick="goHome()">← Back to Portal</div>
        <h1 id="article-title"></h1>
        <div id="ai-summary">Summarizing...</div>
    </div>
</div>

<script>
    // Robust Error Handling logic
    async function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        const lang = document.getElementById('lang-select').value;
        if (!query) return;

        document.getElementById('home-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'block';
        document.getElementById('ai-summary').innerText = "Analyzing...";

        try {
            const url = `https://${lang}.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`;
            const response = await fetch(url);
            const data = await response.json();

            // FIX: Robust check to prevent "reading '0'" error
            if (!data.query || !data.query.pages) throw new Error("Article not found.");
            const pages = Object.values(data.query.pages);
            if (pages.length === 0 || pages[0].pageid === undefined) throw new Error("Article does not exist.");
            
            const page = pages[0];
            document.getElementById('article-title').innerText = page.title;

            // Proxy to your Python backend
            const aiRes = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "google/gemma-4-26b-a4b-it:free",
                    "messages": [
                        {
                            "role": "system", 
                            "content": "Actúa estrictamente como un redactor de enciclopedia profesional. Tu única función es generar el contenido del artículo. No ofrezcas opciones, no saludes, ni añadas introducciones o explicaciones. Sé objetivo, académico y utiliza Markdown limpio."
                        },
                        {
                            "role": "user", 
                            "content": `Resume el siguiente texto de Wikipedia en ${lang} de forma profesional, estructurada y sin relleno:\n\n${page.extract.substring(0, 3000)}`
                        }
                    ]
                })
            });

            const aiData = await aiRes.json();
            document.getElementById('ai-summary').innerText = aiData.choices[0].message.content;
        } catch (e) {
            alert("Error: " + e.message);
            goHome();
        }
    }

    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
    }
</script>
</body>
</html>
