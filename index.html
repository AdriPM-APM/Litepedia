<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LitePedia - AI Wikipedia</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202122;
            --header-bg: #f8f9fa;
            --border-color: #a2a9b1;
            --link-blue: #3366cc;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --header-bg: #1e1e1e;
            --border-color: #444;
            --link-blue: #6699ff;
        }

        body { 
            font-family: sans-serif; background: var(--bg-color); color: var(--text-color); 
            margin: 0; padding: 20px; transition: background 0.3s;
        }

        /* Botón de Modo */
        .theme-toggle { position: fixed; top: 10px; right: 10px; cursor: pointer; padding: 8px; border: 1px solid var(--border-color); background: var(--header-bg); color: var(--text-color); z-index: 2000; }

        /* Contenedor de Búsqueda Optimizado */
        .search-section { 
            border: 1px solid var(--border-color); 
            padding: 25px; 
            border-radius: 12px; 
            background: var(--header-bg); 
            max-width: 900px; 
            margin: 60px auto 20px auto; 
            display: flex; 
            flex-wrap: wrap; /* Esto evita que los elementos desaparezcan */
            align-items: flex-end; 
            gap: 20px; 
            justify-content: center; 
        }
        
        .field { display: flex; flex-direction: column; gap: 8px; min-width: 150px; }
        .field label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--text-color); opacity: 0.8; }
        
        #search-input { padding: 10px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); flex-grow: 1; min-width: 200px; }
        select { padding: 10px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); cursor: pointer; }
        
        button { padding: 10px 25px; border: 1px solid var(--border-color); background: #e8ecef; color: #202122; cursor: pointer; font-weight: bold; }
        button:hover { background: #dcdcdc; }

        #result-display { max-width: 800px; margin: 20px auto; line-height: 1.6; white-space: pre-wrap; font-size: 16px; }

        /* Anuncio */
        .ad-container { position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 1000; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 Modo Oscuro/Claro</button>

<div class="search-section">
    <div class="field" style="flex-grow: 2;">
        <label>BÚSQUEDA</label>
        <input type="text" id="search-input" placeholder="Buscar artículo...">
    </div>
    
    <div class="field">
        <label>SOURCE WIKIPEDIA</label>
        <select id="source-lang-select">
            <option value="en" selected>English</option>
            <option value="es">Español</option>
            <option value="ca">Català</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div class="field">
        <label>OUTPUT LANGUAGE</label>
        <select id="output-lang-select">
            <option value="en">English</option>
            <option value="es" selected>Español</option>
            <option value="ca">Català</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <button onclick="executeSearch()">Search</button>
</div>

<div id="result-display" style="text-align: center; color: var(--text-color);"></div>

<div class="ad-container">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" crossorigin="anonymous"></script>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3556713788542025" data-ad-slot="2168826316" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script>
    const langNames = { "en": "English", "es": "Spanish", "ca": "Catalan", "fr": "French" };

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    async function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        const sourceLang = document.getElementById('source-lang-select').value;
        const outputLang = document.getElementById('output-lang-select').value;
        const outputLangName = langNames[outputLang];
        const display = document.getElementById('result-display');

        if (!query) return alert("Por favor, introduce un término de búsqueda.");

        display.innerText = "Consultando Wikipedia...";

        try {
            const url = `https://${sourceLang}.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (!data.query || !data.query.pages) throw new Error("No se encontraron resultados.");
            const page = Object.values(data.query.pages)[0];
            if (!page.extract) throw new Error("No hay contenido disponible.");

            display.innerText = "Traduciendo con IA...";

            const aiRes = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "google/gemma-4-26b-a4b-it:free",
                    "temperature": 0.3,
                    "messages": [
                        { "role": "system", "content": `Eres un traductor experto. Responde siempre en ${outputLangName}.` },
                        { "role": "user", "content": `Resume el siguiente texto en ${outputLangName}:\n\n${page.extract.substring(0, 3000)}` }
                    ]
                })
            });

            const aiData = await aiRes.json();
            if (aiData.choices && aiData.choices[0]) {
                display.innerText = aiData.choices[0].message.content;
            } else {
                display.innerText = "Error en la respuesta de la IA.";
            }

        } catch (e) {
            display.innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>
