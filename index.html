<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LitePedia AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 2rem 1rem; margin: 0; }
        .container { width: 100%; max-width: 700px; }
        
        /* Header & Search */
        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; }
        .search-box { display: flex; gap: 0.5rem; background: white; padding: 0.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input { flex: 1; border: none; padding: 1rem; font-size: 1rem; outline: none; border-radius: 8px; }
        button { background: var(--primary); color: white; border: none; padding: 0 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }

        /* AI Cards */
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); margin-top: 2rem; display: none; }
        .loader { display: none; text-align: center; margin-top: 2rem; font-style: italic; color: #64748b; }
        #ai-summary { line-height: 1.7; font-size: 1.1rem; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--primary); cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header id="home-view">
        <h1>LitePedia</h1>
        <p style="color: #64748b;">Wikipedia potenciada con Inteligencia Artificial</p>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="¿Qué quieres aprender hoy?">
            <button onclick="executeSearch()">Buscar</button>
        </div>
    </header>

    <div id="reader-view" class="card">
        <div class="back-link" onclick="goHome()">← Volver al inicio</div>
        <h2 id="article-title" style="margin-top: 0;"></h2>
        <div id="ai-summary"></div>
    </div>
    
    <div id="loading" class="loader">Analizando Wikipedia...</div>
</div>

<script>
    async function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        document.getElementById('home-view').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';

        try {
            // 1. Fetch Wikipedia
            const wikiRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`);
            const wikiData = await wikiRes.json();
            const page = Object.values(wikiData.query.pages)[0];
            if (!page.extract) throw new Error("No encontrado");

            document.getElementById('article-title').innerText = page.title;

            // 2. Fetch AI (vía el proxy de Vercel)
            const aiRes = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "google/gemma-2-9b-it:free",
                    "messages": [{"role": "user", "content": "Resume lo siguiente de forma concisa y profesional:\n\n" + page.extract.substring(0, 3000)}]
                })
            });

            const aiData = await aiRes.json();
            document.getElementById('ai-summary').innerHTML = marked.parse(aiData.choices[0].message.content);
            document.getElementById('reader-view').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            alert("Error: " + e.message);
            goHome();
        }
    }

    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
