<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia - LitePedia</title>
    <!-- AdSense & Markdown Parser -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3556713788542025" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        body { font-family: sans-serif; margin: 0; padding: 2rem 1rem; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        
        /* UI Components */
        #settings-btn { position: fixed; top: 10px; right: 10px; cursor: pointer; background: #eee; border: none; padding: 5px 10px; border-radius: 4px; }
        .wiki-header { text-align: center; margin-bottom: 20px; }
        .wiki-title { font-family: 'Playfair Display', serif; font-size: 56px; margin: 0; text-transform: uppercase; }
        .search-container { display: flex; width: 100%; margin: 20px 0; }
        .search-container input { flex: 1; border: 1px solid #a2a9b1; border-radius: 3px 0 0 3px; height: 44px; padding-left: 12px; }
        .search-container button { background-color: #3366cc; color: white; border: 1px solid #3366cc; border-radius: 0 3px 3px 0; width: 60px; cursor: pointer; }
        
        #reader-view { display: none; }
        .back-btn { background: none; border: 1px solid #a2a9b1; padding: 5px 15px; cursor: pointer; }
        .error-msg { background-color: #fce4e4; color: #cc0000; padding: 10px; margin: 10px 0; display: none; }
        .content-box { margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<button id="settings-btn" onclick="manageKey()">⚙️ API Key</button>

<div class="container">
    <div id="home-view">
        <div class="wiki-header"><h1 class="wiki-title">Wikipedia</h1></div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search Wikipedia...">
            <button onclick="executeSearch()">🔍</button>
        </div>
        <!-- Ad Banner -->
        <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-3556713788542025" data-ad-slot="1234567890"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="reader-view">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <h2 id="article-title"></h2>
        <div id="error-box" class="error-msg"></div>
        <div id="loading" style="display:none; font-style:italic;">Summarizing...</div>
        <div id="ai-summary" class="content-box"></div>
        <div id="full-text" class="content-box" style="font-size: 13px; color: #666; border-top: 1px solid #ccc; padding-top: 10px;"></div>
    </div>
</div>

<script>
    // 1. KEY MANAGEMENT (Stored in Browser)
    function manageKey() {
        let key = prompt("Enter your OpenRouter API Key:", localStorage.getItem('openrouter_key') || "");
        if (key) localStorage.setItem('openrouter_key', key);
    }

    // 2. SEARCH & FETCH LOGIC
    async function executeSearch() {
        const key = localStorage.getItem('openrouter_key');
        if (!key) return alert("Please set your API key first (⚙️ button)!");
        
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        document.getElementById('home-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'block';
        document.getElementById('loading').style.display = 'block';
        
        try {
            // Wikipedia Fetch (origin=* handles browser CORS)
            const wikiRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`);
            const wikiData = await wikiRes.json();
            const page = Object.values(wikiData.query.pages)[0];
            if (!page.extract) throw new Error("Article not found.");

            document.getElementById('article-title').innerText = page.title;
            document.getElementById('full-text').innerText = page.extract;

            // OpenRouter AI Fetch
        
const aiRes = await fetch("/api/proxy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        "model": "google/gemma-2-9b-it:free",
        "messages": [{"role": "user", "content": "Summarize: " + page.extract.substring(0, 3000)}]
    })
});

            const aiData = await aiRes.json();
            document.getElementById('ai-summary').innerHTML = marked.parse(aiData.choices[0].message.content);
        } catch (e) {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = e.message;
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
    }
</script>
</body>
</html>
