<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Litepedia · AI Wikipedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --text: #1e1e2f;
      --text-secondary: #4a4a5a;
      --border: #e2e8f0;
      --accent: #4f6ef7;
      --accent-hover: #3b55d9;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      --radius: 20px;
      --transition: 0.25s ease;
    }

    body.dark-mode {
      --bg: #12121a;
      --surface: #1e1e2a;
      --text: #edf2f7;
      --text-secondary: #b0b8c8;
      --border: #2d2d3f;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 20px;
      transition: background var(--transition), color var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-weight: 600;
      font-size: 1.7rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo span {
      background: var(--accent);
      color: #fff;
      padding: 2px 10px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-left: 4px;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background var(--transition), border var(--transition);
      box-shadow: var(--shadow);
    }
    .theme-toggle:hover {
      background: var(--border);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 28px;
      transition: background var(--transition), border var(--transition);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 140px;
      min-width: 120px;
    }
    .control-group label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .control-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      transition: border var(--transition), background var(--transition);
      outline: none;
      cursor: pointer;
    }
    .control-group select:focus {
      border-color: var(--accent);
    }

    .search-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      cursor: pointer;
      transition: background var(--transition), transform 0.1s;
      align-self: flex-end;
      height: 44px;
      white-space: nowrap;
    }
    .search-btn:hover {
      background: var(--accent-hover);
    }
    .search-btn:active {
      transform: scale(0.96);
    }

    .search-bar {
      position: relative;
      margin-bottom: 32px;
    }
    .search-bar input {
      width: 100%;
      padding: 16px 20px;
      padding-right: 60px;
      border: 2px solid var(--border);
      border-radius: 60px;
      background: var(--surface);
      color: var(--text);
      font-size: 1.05rem;
      font-family: inherit;
      transition: border var(--transition), box-shadow var(--transition), background var(--transition);
      box-shadow: var(--shadow);
      outline: none;
    }
    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.15);
    }
    .search-bar input::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .search-bar .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
      font-size: 1.2rem;
    }

    /* --- NUEVOS ESTILOS PARA SUGERENCIAS AUTOCOMPLETE --- */
    .suggestions-list {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      z-index: 10;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      list-style: none;
      padding: 6px;
    }
    .suggestions-list.visible {
      display: block;
    }
    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: background var(--transition);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .suggestion-item:hover {
      background: var(--bg);
    }
    .suggestion-item .suggestion-title {
      font-weight: 500;
      color: var(--text);
    }
    .suggestion-item .suggestion-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* ---------------------------------------------------- */

    #ai-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: var(--shadow);
      line-height: 1.7;
      font-size: 1rem;
      transition: background var(--transition), border var(--transition), box-shadow var(--transition);
      display: none;
      min-height: 120px;
      margin-bottom: 30px;
    }
    #ai-output.visible {
      display: block;
    }
    #ai-output p {
      margin-bottom: 1rem;
    }
    #ai-output b {
      color: var(--accent);
      font-weight: 600;
    }
    #ai-output u {
      text-decoration-color: var(--accent);
      text-underline-offset: 3px;
    }
    #ai-output i {
      opacity: 0.9;
    }
    #ai-output .loading {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #ai-output .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #e53e3e;
      font-weight: 500;
    }

    /* Ajuste responsive */
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .control-group {
        flex: 1 1 auto;
      }
      .search-btn {
        align-self: stretch;
      }
      #ai-output {
        padding: 20px;
      }
      .logo {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Cabecera -->
  <header class="header">
    <div class="logo">
      Litepedia
      <span>AI</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">🌓</button>
  </header>

  <!-- Controles de idioma -->
  <div class="controls">
    <div class="control-group">
      <label>Idioma de origen</label>
      <select id="source-lang-select">
        <option value="en">English</option>
        <option value="es" selected>Español</option>
        <option value="ca">Català</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
      </select>
    </div>
    <div class="control-group">
      <label>Idioma de salida</label>
      <select id="output-lang-select">
        <option value="en">English</option>
        <option value="es" selected>Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
      </select>
    </div>
    <button class="search-btn" onclick="executeSearch()">Buscar</button>
  </div>

  <!-- Barra de búsqueda -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Escribe un tema, persona o concepto..." autocomplete="off" />
    <span class="search-icon">🔍</span>
    <!-- Lista de autocompletado añadida -->
    <ul id="suggestions-box" class="suggestions-list"></ul>
  </div>

  <!-- Resultado de la IA -->
  <div id="ai-output"></div>
</div>

<script>
  let debounceTimer;

  // Parseo de Markdown básico
  function parseMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/__(.*?)__/g, '<u>$1</u>')
      .replace(/\*(.*?)\*/g, '<i>$1</i>')
      .replace(/\n/g, '<br>');
  }

  function showLoading() {
    const out = document.getElementById('ai-output');
    out.className = 'visible';
    out.innerHTML = `<div class="loading">La IA está procesando el resumen...</div>`;
  }

  function showError(msg) {
    const out = document.getElementById('ai-output');
    out.className = 'visible';
    out.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  }

  function showResult(html) {
    const out = document.getElementById('ai-output');
    out.className = 'visible';
    out.innerHTML = html;
  }

  // Alternar tema
  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }

  // LÓGICA DE AUTOCOMPLETADO (WIKIPEDIA OPENSEARCH)
  const searchInput = document.getElementById('search-input');
  const suggestionsBox = document.getElementById('suggestions-box');

  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const query = searchInput.value.trim();
    const sourceLang = document.getElementById('source-lang-select').value;

    if (query.length < 2) {
      suggestionsBox.classList.remove('visible');
      return;
    }

    // Debounce de 300ms para evitar llamadas excesivas a la API
    debounceTimer = setTimeout(async () => {
      try {
        const url = `https://${sourceLang}.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=6&namespace=0&format=json&origin=*`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        
        // data[1] son los títulos, data[2] son las descripciones cortas de Wikipedia
        const titles = data[1] || [];
        const descriptions = data[2] || [];

        if (titles.length === 0) {
          suggestionsBox.classList.remove('visible');
          return;
        }

        suggestionsBox.innerHTML = '';
        titles.forEach((title, index) => {
          const li = document.createElement('li');
          li.className = 'suggestion-item';
          
          const descText = descriptions[index] || 'Artículo de Wikipedia';
          
          li.innerHTML = `
            <span class="suggestion-title">${title}</span>
            <span class="suggestion-desc">${descText}</span>
          `;

          li.addEventListener('click', () => {
            searchInput.value = title;
            suggestionsBox.classList.remove('visible');
            executeSearch(); // Ejecuta la búsqueda automáticamente al hacer clic
          });

          suggestionsBox.appendChild(li);
        });

        suggestionsBox.classList.add('visible');
      } catch (err) {
        console.error('Error al obtener sugerencias:', err);
      }
    }, 300);
  });

  // Cerrar la lista de sugerencias al hacer clic fuera del buscador
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.classList.remove('visible');
    }
  });

  // Búsqueda principal
  async function executeSearch() {
    suggestionsBox.classList.remove('visible');
    const query = searchInput.value.trim();
    const sourceLang = document.getElementById('source-lang-select').value;
    const targetLang = document.getElementById('output-lang-select').value;

    if (!query) {
      showError('Por favor, escribe un término para buscar.');
      return;
    }

    showLoading();

    try {
      // 1. Obtener extracto de Wikipedia
      const wikiUrl =
        `https://${sourceLang}.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&titles=${encodeURIComponent(query)}&origin=*&format=json`;
      const wikiRes = await fetch(wikiUrl);
      if (!wikiRes.ok) throw new Error('Error al conectar con Wikipedia');
      const wikiData = await wikiRes.json();
      const pages = wikiData.query.pages;
      const page = Object.values(pages)[0];

      if (!page || page.missing) {
        throw new Error(`No se encontró el artículo "${query}" en Wikipedia (${sourceLang}).`);
      }
      if (!page.extract) {
        throw new Error('El artículo está vacío o no tiene contenido textual.');
      }

      const extract = page.extract.slice(0, 4000);

      // 2. Llamar a la IA (endpoint en Vercel)
      const aiPayload = {
        model: 'google/gemma-4-26b-a4b-it:free',
        messages: [
          {
            role: 'system',
            content: `Eres un asistente que resume artículos de Wikipedia. 
              Responde SIEMPRE en el idioma solicitado (${targetLang}). 
              Usa **negrita** para conceptos clave, *cursiva* para términos técnicos 
              y __subrayado__ para advertencias o datos importantes.
              El resumen debe ser claro, conciso y bien estructurado (máximo 3 párrafos).`
          },
          {
            role: 'user',
            content: `Artículo de Wikipedia (en ${sourceLang}):\n\n${extract}\n\n 
              Haz un resumen en ${targetLang} siguiendo el formato indicado.`
          }
        ],
        temperature: 0.7,
        max_tokens: 600
      };

      const aiRes = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(aiPayload)
      });

      if (!aiRes.ok) {
        const errText = await aiRes.text();
        throw new Error(`Error en el proxy de IA (${aiRes.status}): ${errText}`);
      }
      const aiData = await aiRes.json();

      let raw = aiData.choices?.[0]?.message?.content;
      if (!raw) {
        raw = aiData.output || aiData.response || JSON.stringify(aiData);
        if (!raw || raw.length < 10) throw new Error('La IA devolvió una respuesta vacía o inválida.');
      }

      const html = parseMarkdown(raw);
      showResult(html);

    } catch (err) {
      showError(err.message);
      console.error(err);
    }
  }

  // Buscar con Enter
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') executeSearch();
  });

  // Tema oscuro por sistema
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.body.classList.add('dark-mode');
  }
</script>

</body>
</html>
